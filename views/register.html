<!DOCTYPE html>
<html lang="en">
<head>
<title>Register</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f0f9ff, #ffffff);
        margin: 0;
        padding: 0;
    }

    .register-container {
        width: 380px;
        margin: 80px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        text-align: center;
    }

    h1 {
        color: #1e3a8a;
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
    }

    input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 5px rgba(37,99,235,0.3);
    }

    button {
        width: 95%;
        padding: 10px;
        background: #16a34a;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
        transition: 0.3s;
    }

    button:hover {
        background: #15803d;
    }

    .back-btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 15px;
        background: #6b7280;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: 0.3s;
    }

    .back-btn:hover {
        background: #374151;
    }

    .footer-text {
        margin-top: 15px;
        font-size: 14px;
    }

    .footer-text a {
        color: #2563eb;
        text-decoration: none;
    }
</style>

</head>

<body>

<div class="register-container">

    <h1>📝 Register</h1>

    <form action="/register" method="POST">

        <input type="text" placeholder="Name" required>

        <input type="email" placeholder="Email" required>

        <input type="text" placeholder="Mobile" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Register</button>

    </form>

    <!-- Back Button -->
    <a href="/" class="back-btn">← Back to Home</a>

    <div class="footer-text">
        Already have an account? <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
